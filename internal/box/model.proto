syntax = "proto3";
package box;

import "google/protobuf/timestamp.proto";

option go_package = "./pb";

message Introduce {
  string Name = 1;
  bytes PublicKey = 2;
}

message Handshake {
  bytes Key = 1;
  bytes Salt = 2;
  string SessionKey = 3;
}

message Peer {
  string Name = 1;
  bytes PublicKey = 2;
  google.protobuf.Timestamp FirstSeen = 3;
  google.protobuf.Timestamp LastSeen = 4;
}
