syntax = "proto3";
package box;
option go_package = "./pb";

import "google/protobuf/timestamp.proto";

message Peer {
  bytes ID = 1;
  string PublicKey = 2;
  repeated string Address = 3;
  string Title = 4;
  google.protobuf.Timestamp RegisteredAt = 5;
}

message Message {
  uint64 SequenceNum = 1;
  bytes SenderID = 2;
  bytes ReceiverID = 3;
  bytes Data = 4;
}
