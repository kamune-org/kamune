[server]
address = "127.0.0.1:8888"
password = ""
expose_health = true
expose_ip = true

[ws]
enabled = true

[session]
token_ttl = "5m"
max_concurrent_sessions = 10_000
max_message_size = 65536

[tcp]
enabled = true
address = "127.0.0.1:8889"

[tls]
enabled = true
address = "127.0.0.1:8890"
# cert_file = "assets/cert/server.crt"
# key_file = "assets/cert/server.key"

[rate_limit]
enabled = true
time_window = "1m"
quota = 20
# max_entries = 100000  # max unique IPs tracked (default: max_concurrent_sessions)
