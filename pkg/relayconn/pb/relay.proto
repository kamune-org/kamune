syntax = "proto3";
package relayconn;

option go_package = "./pb";

message Frame {
  oneof kind {
    Register   register   = 1;
    Registered registered = 2;
    Message    msg        = 3;
    Ping       ping       = 4;
    Pong       pong       = 5;
    Auth       auth       = 6;  // PSK mode only, optional
  }
}

message Register {
  bytes token = 1;  // 16 bytes in MODE_JOIN; empty in MODE_CREATE = ask relay
                    // to generate a random token; 16 bytes in MODE_CREATE =
                    // precomputed static token (relay must accept it)
  Mode  mode  = 2;  // required: MODE_CREATE or MODE_JOIN

  enum Mode {
    MODE_UNSPECIFIED = 0;  // reserved, will be rejected
    MODE_CREATE      = 1;  // create new session
    MODE_JOIN        = 2;  // join existing session
  }
}

message Registered {
  bytes  token                = 1;  // session token assigned by relay
  uint32 ttl_seconds          = 2;  // token validity duration in seconds (0 = unknown)
  uint32 session_ttl_seconds  = 3;  // paired session max lifetime (0 = no limit)
}

message Message {
  bytes data = 1;
}

message Ping {}

message Pong {}

message Auth {
  bytes psk = 1;  // pre-shared key for PSK mode
}
