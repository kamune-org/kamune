syntax = "proto3";
package relayconn;

option go_package = "./pb";

message Frame {
  oneof kind {
    Identity identity = 1;
    Message  msg      = 2;
    Ack      ack      = 3;
    Ping     ping     = 4;
    Pong     pong     = 5;
  }
}

message Identity {
  bytes key = 1;
}

message Message {
  bytes  receiver   = 1;  // set by sender for routing; relay uses this to deliver
  bytes  sender     = 2;  // set by relay when forwarding so receiver knows who sent it
  string session_id = 3;
  bytes  data       = 4;
}

message Ack {
  string session_id = 1;
}

message Ping {}
message Pong {}
