<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#56d4dd"/>
      <stop offset="100%" stop-color="#1b7c83"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#da6d25"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#da3633"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#56d4dd"/>
    </marker>
    <marker id="arrowTealL" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#56d4dd"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowOrangeL" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowPurpleL" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ee787"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="780" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="778" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700" letter-spacing="0.5">Session Resumption Flow</text>
  <text x="450" y="60" text-anchor="middle" fill="#8b949e" font-size="11">Reconnect using persisted shared secret — no full handshake required</text>

  <!-- ══════════ Prerequisite note ══════════ -->
  <rect x="230" y="72" width="440" height="32" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="92" text-anchor="middle" fill="#6e7681" font-size="10">Prerequisite: Both peers have a persisted SessionState from a prior Established session</text>

  <!-- ══════════ Peer Headers ══════════ -->
  <!-- Initiator header -->
  <rect x="70" y="116" width="160" height="44" rx="10" fill="#21262d" stroke="#56d4dd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="70" y="116" width="160" height="4" rx="2" fill="url(#gTeal)"/>
  <text x="150" y="139" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Initiator</text>
  <text x="150" y="154" text-anchor="middle" fill="#8b949e" font-size="10">(Client)</text>

  <!-- Responder header -->
  <rect x="670" y="116" width="160" height="44" rx="10" fill="#21262d" stroke="#56d4dd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="670" y="116" width="160" height="4" rx="2" fill="url(#gTeal)"/>
  <text x="750" y="139" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Responder</text>
  <text x="750" y="154" text-anchor="middle" fill="#8b949e" font-size="10">(Server)</text>

  <!-- Vertical lifelines -->
  <line x1="150" y1="166" x2="150" y2="720" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="750" y1="166" x2="750" y2="720" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- STEP 1: ReconnectRequest                                      -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="40" y="178" width="820" height="140" rx="10" fill="#0d1117" stroke="#1b7c83" stroke-width="1.2" filter="url(#shadow)"/>
  <!-- Header bar -->
  <rect x="40" y="178" width="820" height="28" rx="10" fill="url(#gTeal)" opacity="0.12"/>
  <rect x="40" y="196" width="820" height="10" fill="url(#gTeal)" opacity="0.12"/>
  <circle cx="60" cy="192" r="5" fill="url(#gTeal)"/>
  <text x="75" y="197" fill="#56d4dd" font-size="12" font-weight="700" letter-spacing="0.8">STEP 1 — RECONNECT REQUEST</text>
  <text x="845" y="197" text-anchor="end" fill="#8b949e" font-size="10">Route: RECONNECT</text>

  <!-- Initiator loads session & generates challenge -->
  <rect x="55" y="214" width="130" height="42" rx="6" fill="#21262d" stroke="#1b7c83" stroke-width="0.8"/>
  <text x="120" y="230" text-anchor="middle" fill="#56d4dd" font-size="8.5" font-weight="600">Load SessionState</text>
  <text x="120" y="243" text-anchor="middle" fill="#6e7681" font-size="7.5">Gen challenge (32B)</text>
  <text x="120" y="253" text-anchor="middle" fill="#6e7681" font-size="7.5">from crypto/rand</text>

  <!-- Arrow 1: Initiator → Responder (ReconnectRequest) -->
  <line x1="170" y1="272" x2="730" y2="272" stroke="#56d4dd" stroke-width="1.8" marker-end="url(#arrowTeal)" filter="url(#glow)"/>
  <rect x="245" y="259" width="410" height="24" rx="5" fill="#0d1117" stroke="#1b7c83" stroke-width="0.8"/>
  <text x="450" y="276" text-anchor="middle" fill="#c9d1d9" font-size="10.5" font-weight="500">ReconnectRequest { SessionId, PublicKey, SeqNums, Challenge }</text>

  <!-- Signed label -->
  <text x="450" y="254" text-anchor="middle" fill="#56d4dd" font-size="8" font-weight="600">✏️ Signed (unencrypted)</text>

  <!-- Responder validates -->
  <rect x="725" y="284" width="130" height="28" rx="6" fill="#21262d" stroke="#1b7c83" stroke-width="0.8"/>
  <text x="790" y="298" text-anchor="middle" fill="#56d4dd" font-size="8" font-weight="600">✓ Verify Sig</text>
  <text x="790" y="309" text-anchor="middle" fill="#6e7681" font-size="7.5">Lookup session by PubKey</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- STEP 2: ReconnectResponse (Challenge-Response)                -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="40" y="328" width="820" height="140" rx="10" fill="#0d1117" stroke="#da6d25" stroke-width="1.2" filter="url(#shadow)"/>
  <!-- Header bar -->
  <rect x="40" y="328" width="820" height="28" rx="10" fill="url(#gOrange)" opacity="0.12"/>
  <rect x="40" y="346" width="820" height="10" fill="url(#gOrange)" opacity="0.12"/>
  <circle cx="60" cy="342" r="5" fill="url(#gOrange)"/>
  <text x="75" y="347" fill="#f0883e" font-size="12" font-weight="700" letter-spacing="0.8">STEP 2 — SERVER CHALLENGE-RESPONSE</text>
  <text x="845" y="347" text-anchor="end" fill="#8b949e" font-size="10">Proves shared secret possession</text>

  <!-- Responder computes challenge response + gen server challenge -->
  <rect x="715" y="364" width="140" height="50" rx="6" fill="#21262d" stroke="#da6d25" stroke-width="0.8"/>
  <text x="785" y="378" text-anchor="middle" fill="#f0883e" font-size="8" font-weight="600">HKDF(secret, nil,</text>
  <text x="785" y="390" text-anchor="middle" fill="#f0883e" font-size="8" font-weight="600">  challenge, 32)</text>
  <text x="785" y="404" text-anchor="middle" fill="#6e7681" font-size="7.5">+ Gen serverChallenge</text>

  <!-- Arrow 2: Responder → Initiator (ReconnectResponse) -->
  <line x1="730" y1="427" x2="170" y2="427" stroke="#f0883e" stroke-width="1.8" marker-end="url(#arrowOrangeL)" filter="url(#glow)"/>
  <rect x="205" y="414" width="490" height="24" rx="5" fill="#0d1117" stroke="#da6d25" stroke-width="0.8"/>
  <text x="450" y="431" text-anchor="middle" fill="#c9d1d9" font-size="10.5" font-weight="500">ReconnectResponse { Accepted, ChallengeResponse, ServerChallenge, SeqNums }</text>

  <!-- Initiator verifies server response -->
  <rect x="55" y="440" width="140" height="20" rx="4" fill="#21262d" stroke="#484f58" stroke-width="0.6"/>
  <text x="125" y="454" text-anchor="middle" fill="#7ee787" font-size="8" font-weight="600">✓ ConstantTimeCompare(response)</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- STEP 3: ReconnectVerify (Client proves back)                  -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="40" y="478" width="820" height="120" rx="10" fill="#0d1117" stroke="#8b5cf6" stroke-width="1.2" filter="url(#shadow)"/>
  <!-- Header bar -->
  <rect x="40" y="478" width="820" height="28" rx="10" fill="url(#gPurple)" opacity="0.12"/>
  <rect x="40" y="496" width="820" height="10" fill="url(#gPurple)" opacity="0.12"/>
  <circle cx="60" cy="492" r="5" fill="url(#gPurple)"/>
  <text x="75" y="497" fill="#d2a8ff" font-size="12" font-weight="700" letter-spacing="0.8">STEP 3 — CLIENT VERIFICATION</text>
  <text x="845" y="497" text-anchor="end" fill="#8b949e" font-size="10">Client proves shared secret</text>

  <!-- Initiator computes response to server challenge -->
  <rect x="55" y="514" width="130" height="32" rx="6" fill="#21262d" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="120" y="528" text-anchor="middle" fill="#d2a8ff" font-size="8" font-weight="600">HKDF(secret, nil,</text>
  <text x="120" y="540" text-anchor="middle" fill="#d2a8ff" font-size="8" font-weight="600">  serverChallenge, 32)</text>

  <!-- Arrow 3: Initiator → Responder (ReconnectVerify) -->
  <line x1="170" y1="560" x2="730" y2="560" stroke="#d2a8ff" stroke-width="1.8" marker-end="url(#arrowPurple)" filter="url(#glow)"/>
  <rect x="285" y="547" width="330" height="24" rx="5" fill="#0d1117" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="450" y="564" text-anchor="middle" fill="#c9d1d9" font-size="10.5" font-weight="500">ReconnectVerify { ChallengeResponse, Verified }</text>

  <!-- Responder verifies -->
  <rect x="725" y="572" width="130" height="18" rx="4" fill="#21262d" stroke="#484f58" stroke-width="0.6"/>
  <text x="790" y="585" text-anchor="middle" fill="#7ee787" font-size="8" font-weight="600">✓ ConstantTimeCompare(response)</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- STEP 4: ReconnectComplete + Sequence Reconciliation           -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="40" y="602" width="820" height="110" rx="10" fill="#0d1117" stroke="#238636" stroke-width="1.2" filter="url(#shadow)"/>
  <!-- Header bar -->
  <rect x="40" y="602" width="820" height="28" rx="10" fill="url(#gGreen)" opacity="0.12"/>
  <rect x="40" y="620" width="820" height="10" fill="url(#gGreen)" opacity="0.12"/>
  <circle cx="60" cy="616" r="5" fill="url(#gGreen)"/>
  <text x="75" y="621" fill="#7ee787" font-size="12" font-weight="700" letter-spacing="0.8">STEP 4 — COMPLETE &amp; RECONCILE</text>
  <text x="845" y="621" text-anchor="end" fill="#8b949e" font-size="10">Sequence reconciliation</text>

  <!-- Responder reconciles sequences -->
  <rect x="715" y="636" width="140" height="32" rx="6" fill="#21262d" stroke="#238636" stroke-width="0.8"/>
  <text x="785" y="650" text-anchor="middle" fill="#7ee787" font-size="8" font-weight="600">sendSeq = max(local, remote)</text>
  <text x="785" y="662" text-anchor="middle" fill="#7ee787" font-size="8" font-weight="600">recvSeq = max(local, remote)</text>

  <!-- Arrow 4: Responder → Initiator (ReconnectComplete) -->
  <line x1="730" y1="680" x2="170" y2="680" stroke="#7ee787" stroke-width="1.8" marker-end="url(#arrowTealL)" filter="url(#glow)"/>
  <rect x="265" y="667" width="370" height="24" rx="5" fill="#0d1117" stroke="#238636" stroke-width="0.8"/>
  <text x="450" y="684" text-anchor="middle" fill="#c9d1d9" font-size="10.5" font-weight="500">ReconnectComplete { Success, ResumeSendSeq, ResumeRecvSeq }</text>

  <!-- Initiator restores transport -->
  <rect x="55" y="694" width="130" height="18" rx="4" fill="#21262d" stroke="#484f58" stroke-width="0.6"/>
  <text x="120" y="707" text-anchor="middle" fill="#7ee787" font-size="8" font-weight="600">Restore Transport</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- ESTABLISHED BANNER                                            -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="250" y="726" width="400" height="40" rx="10" fill="#0d1117" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <rect x="248" y="724" width="404" height="44" rx="12" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.25" filter="url(#glow)"/>
  <rect x="250" y="726" width="400" height="4" rx="2" fill="url(#gGreen)"/>
  <text x="450" y="752" text-anchor="middle" fill="#7ee787" font-size="15" font-weight="700" letter-spacing="1">✓ SESSION RESUMED</text>

  <!-- Connection dots to established -->
  <line x1="150" y1="714" x2="150" y2="746" stroke="#7ee787" stroke-width="1.5"/>
  <circle cx="150" cy="746" r="4" fill="#7ee787"/>
  <line x1="750" y1="714" x2="750" y2="746" stroke="#7ee787" stroke-width="1.5"/>
  <circle cx="750" cy="746" r="4" fill="#7ee787"/>

  <!-- Footer -->
  <text x="450" y="774" text-anchor="middle" fill="#484f58" font-size="9">All messages are signed but unencrypted · Shared secret is never transmitted · Falls back to full handshake on failure</text>

  <!-- ══════════ Side annotations — what is proved ══════════ -->
  <!-- Right-side proof annotations -->
  <rect x="14" y="266" width="22" height="22" rx="4" fill="#21262d" stroke="#56d4dd" stroke-width="0.8"/>
  <text x="25" y="281" text-anchor="middle" fill="#56d4dd" font-size="10" font-weight="700">1</text>

  <rect x="14" y="421" width="22" height="22" rx="4" fill="#21262d" stroke="#f0883e" stroke-width="0.8"/>
  <text x="25" y="436" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="700">2</text>

  <rect x="14" y="554" width="22" height="22" rx="4" fill="#21262d" stroke="#d2a8ff" stroke-width="0.8"/>
  <text x="25" y="569" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="700">3</text>

  <rect x="14" y="674" width="22" height="22" rx="4" fill="#21262d" stroke="#7ee787" stroke-width="0.8"/>
  <text x="25" y="689" text-anchor="middle" fill="#7ee787" font-size="10" font-weight="700">4</text>
</svg>
