openapi: 3.1.0
info:
  title: Kamune Relay server
  description: Relay implementation for the Kamune project
  version: 0.2.0
paths:
  /health:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      description: >
        Returns the current health status of the relay server, including
        storage reachability, uptime, and configured identity algorithm.
      responses:
        "200":
          description: Server is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  health:
                    $ref: "#/components/schemas/HealthStatus"
                required:
                  - health
                title: HealthCheckOk
              example:
                health:
                  status: ok
                  storage: ok
                  latency: "1.234ms"
                  identity: ed25519
                  uptime: "2h 15m 30s"
                  started_at: "2025-01-15 10:30:00 UTC"
        "503":
          description: Server is degraded (e.g. storage unreachable).
          content:
            application/json:
              schema:
                type: object
                properties:
                  health:
                    $ref: "#/components/schemas/HealthStatus"
                required:
                  - health
                title: HealthCheckDegraded
  /identity:
    get:
      operationId: relayPublicKey
      tags:
        - identity
      summary: Relay public key
      description: >
        Returns the relay server's public key encoded in the requested format.
        Use the optional `format` query parameter to control the encoding.
        Supported formats: base64 (default), hex, emoji, fingerprint.
        The parameter is case-insensitive; unrecognised values fall back to base64.
      parameters:
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum:
              - base64
              - hex
              - emoji
              - fingerprint
            default: base64
          description: >
            Encoding format for the public key.
            base64: base64 raw-URL encoding of the raw key bytes (default).
            hex: colon-separated uppercase hex bytes (e.g. "30:2A:30:...").
            emoji: 8 emoji symbols derived from a SHA-256 hash, joined with " • ".
            fingerprint: base64 raw-URL encoded SHA-256 digest of the key.
      responses:
        "200":
          description: >
            The request was successful, and the server has returned the
            requested resource in the response body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  identity:
                    $ref: "#/components/schemas/IdentityResponse"
                required:
                  - identity
                title: RelayPublicKeyOk
  /metrics:
    get:
      operationId: prometheusMetrics
      tags:
        - observability
      summary: Prometheus-compatible metrics
      description: >
        Returns application-level counters and gauges in the Prometheus text
        exposition format. Includes HTTP request counts, message relay stats,
        WebSocket connection gauges, webhook counters, and more.
      responses:
        "200":
          description: Metrics in Prometheus text format.
          content:
            text/plain:
              schema:
                type: string
  /ws:
    get:
      operationId: websocketRelay
      tags:
        - websocket
      summary: WebSocket endpoint for bidirectional relay
      description: >
        Upgrades the HTTP connection to a persistent WebSocket for real-time
        bidirectional message relay. The peer's public key must be provided
        as a query parameter. Once connected, the server enters a read loop
        that processes incoming JSON messages.


        Inbound message types (client → server):

        - `message`: relay a message to another peer (fields: receiver, session_id, data)

        - `ping`: keepalive; the server responds with `pong`


        Outbound message types (server → client):

        - `connected`: handshake succeeded

        - `message`: incoming message from another peer

        - `message_ack`: relayed message was delivered

        - `message_queued`: relayed message was queued

        - `pong`: response to a ping

        - `error`: processing error
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the connecting peer
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established.
        "400":
          description: Missing or invalid public key query parameter.
  /ip:
    get:
      operationId: clientsPublicIp
      tags:
        - ip
      summary: Client's Public IP
      responses:
        "200":
          description: >
            The request was successful, and the server has returned the
            requested resource in the response body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ip:
                    type: string
                required:
                  - ip
                title: ClientsPublicIpOk
  /peers:
    post:
      operationId: registerAPeer
      tags:
        - peer
      summary: Register a peer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: array
                  items:
                    type: string
                identity:
                  type: string
                public_key:
                  type: string
                title:
                  type: string
              required:
                - identity
                - public_key
                - title
      responses:
        "201":
          description: The request was successful, and a new resource was created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  peer:
                    $ref: "#/components/schemas/Peer"
                required:
                  - peer
                title: RegisterAPeerCreated
        "409":
          description: >
            The request could not be completed due to a conflict with the
            current state of the resource. Resolve the conflict and try again.
          content:
            application/json:
              schema:
                type: object
                properties:
                  peer:
                    $ref: "#/components/schemas/Peer"
                required:
                  - peer
                title: RegisterAPeerConflict
    get:
      operationId: inquiryAPeer
      tags:
        - peer
      summary: Inquiry a peer
      parameters:
        - in: query
          name: key
          required: true
          style: form
          explode: true
          schema:
            type: string
          allowReserved: false
      responses:
        "200":
          description: >
            The request was successful, and the server has returned the
            requested resource in the response body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  peer:
                    $ref: "#/components/schemas/Peer"
                required:
                  - peer
                title: InquiryAPeerOk
        "404":
          $ref: "#/components/responses/NotFound"
  /peers/refresh:
    post:
      operationId: refreshPeer
      tags:
        - peer
      summary: Refresh peer TTL (heartbeat)
      description: >
        Renews the TTL on an existing peer registration without re-registering.
        Optionally updates the peer's addresses if a JSON body is provided.
        If no body is sent, the existing addresses are preserved.
      parameters:
        - in: query
          name: key
          required: true
          style: form
          explode: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the peer
          allowReserved: false
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: array
                  items:
                    type: string
                  description: Optional new addresses to replace the stored ones
      responses:
        "200":
          description: Peer TTL renewed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  peer:
                    $ref: "#/components/schemas/Peer"
                required:
                  - peer
                title: RefreshPeerOk
        "404":
          $ref: "#/components/responses/NotFound"
  /peers/{id}:
    delete:
      operationId: discardAPeer
      tags:
        - peer
      summary: Discard a peer
      parameters:
        - in: query
          name: key
          required: true
          style: form
          explode: true
          schema:
            type: string
          allowReserved: false
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: >
            The request was successful, but there is no content to return in
            the response.
          content:
            application/json:
              schema:
                type: "null"
                title: DiscardAPeerNoContent
  /convey:
    post:
      operationId: conveyMessage
      tags:
        - convey
      summary: Relay a message between peers
      description: >
        Attempts direct delivery to the receiver's registered addresses.
        If direct delivery fails (or no addresses are known), the message
        is automatically enqueued for later retrieval via the queue endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sender:
                  type: string
                  description: Base64 raw URL encoded public key of the sender
                receiver:
                  type: string
                  description: Base64 raw URL encoded public key of the receiver
                session_id:
                  type: string
                  description: Application-level session identifier
                data:
                  type: string
                  description: Base64 raw URL encoded message payload
              required:
                - sender
                - receiver
                - session_id
                - data
      responses:
        "200":
          description: Message was delivered directly to the receiver.
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivered:
                    type: boolean
                required:
                  - delivered
                title: ConveyMessageDelivered
        "202":
          description: >
            Direct delivery failed; the message has been queued for later
            retrieval by the receiver.
          content:
            application/json:
              schema:
                type: object
                properties:
                  queued:
                    type: boolean
                required:
                  - queued
                title: ConveyMessageQueued
        "400":
          description: Bad request (missing or invalid fields).
        "409":
          description: Queue is full for this sender/receiver/session tuple.
        "413":
          description: Message payload exceeds the configured maximum size.
  /queues:
    post:
      operationId: pushToQueue
      tags:
        - queue
      summary: Push a message to the queue
      description: >
        Enqueues a message for a specific sender/receiver/session tuple.
        The message can later be retrieved via `GET /queues`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sender:
                  type: string
                  description: Base64 raw URL encoded public key of the sender
                receiver:
                  type: string
                  description: Base64 raw URL encoded public key of the receiver
                session_id:
                  type: string
                  description: Application-level session identifier
                data:
                  type: string
                  description: Base64 raw URL encoded message payload
              required:
                - sender
                - receiver
                - session_id
                - data
      responses:
        "201":
          description: Message successfully enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
                title: PushToQueueCreated
        "400":
          description: Bad request (missing or invalid fields).
        "409":
          description: Queue is full for this sender/receiver/session tuple.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
                title: PushToQueueConflict
        "413":
          description: Message payload exceeds the configured maximum size.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
                title: PushToQueueTooLarge
    get:
      operationId: popFromQueue
      tags:
        - queue
      summary: Pop a message from the queue
      description: >
        Dequeues the oldest message for a specific sender/receiver/session
        tuple. Messages are returned in FIFO order.
      parameters:
        - in: query
          name: sender
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the sender
        - in: query
          name: receiver
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the receiver
        - in: query
          name: session
          required: true
          schema:
            type: string
          description: Application-level session identifier
      responses:
        "200":
          description: A message was successfully dequeued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    description: Base64 raw URL encoded message payload
                required:
                  - data
                title: PopFromQueueOk
        "204":
          description: Queue is empty; no messages available.
        "400":
          description: Bad request (missing or invalid query parameters).
        "404":
          description: No queue found for the given parameters.
  /queues/batch:
    get:
      operationId: batchPopFromQueue
      tags:
        - queue
      summary: Pop multiple messages from the queue
      description: >
        Dequeues up to `limit` messages for a specific sender/receiver/session
        tuple in a single request. Messages are returned in FIFO order.
        Returns 204 No Content if the queue is empty.
      parameters:
        - in: query
          name: sender
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the sender
        - in: query
          name: receiver
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the receiver
        - in: query
          name: session
          required: true
          schema:
            type: string
          description: Application-level session identifier
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Maximum number of messages to pop (default 10, max 100)
      responses:
        "200":
          description: One or more messages were successfully dequeued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                    description: Base64 raw URL encoded message payloads
                  count:
                    type: integer
                    description: Number of messages returned
                required:
                  - data
                  - count
                title: BatchPopFromQueueOk
        "204":
          description: Queue is empty; no messages available.
        "400":
          description: Bad request (missing or invalid query parameters).
  /queues/length:
    get:
      operationId: queueLength
      tags:
        - queue
      summary: Peek at queue depth
      description: >
        Returns the number of pending messages in the queue for a given
        sender/receiver/session tuple without consuming any messages.
      parameters:
        - in: query
          name: sender
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the sender
        - in: query
          name: receiver
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the receiver
        - in: query
          name: session
          required: true
          schema:
            type: string
          description: Application-level session identifier
      responses:
        "200":
          description: Queue length returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  length:
                    type: integer
                    format: uint64
                    description: Number of pending messages in the queue
                required:
                  - length
                title: QueueLengthOk
        "400":
          description: Bad request (missing or invalid query parameters).
  /webhooks:
    post:
      operationId: registerWebhook
      tags:
        - webhook
      summary: Register a webhook callback URL
      description: >
        Registers a webhook URL for a peer. When a message arrives for that
        peer and is enqueued, the relay will POST a JSON notification to the
        provided URL. Webhook delivery is best-effort and non-blocking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                public_key:
                  type: string
                  description: Base64 raw URL encoded public key of the peer
                url:
                  type: string
                  description: The webhook callback URL to receive notifications
              required:
                - public_key
                - url
      responses:
        "201":
          description: Webhook registered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
                title: RegisterWebhookCreated
        "400":
          description: Bad request (missing or invalid fields).
    delete:
      operationId: unregisterWebhook
      tags:
        - webhook
      summary: Remove a webhook registration
      description: >
        Removes the webhook callback registration for the given public key.
      parameters:
        - in: query
          name: key
          required: true
          schema:
            type: string
          description: Base64 raw URL encoded public key of the peer
          allowReserved: false
      responses:
        "204":
          description: Webhook removed successfully.
        "404":
          $ref: "#/components/responses/NotFound"
servers:
  - url: http://127.0.0.1:8888
    description: Development server
tags:
  - name: health
  - name: identity
  - name: ip
  - name: peer
  - name: convey
  - name: queue
  - name: websocket
  - name: webhook
  - name: observability
components:
  responses:
    NotFound:
      description: >
        The server cannot find the requested resource. The endpoint may be
        invalid or the resource may no longer exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
            required:
              - message
    Conflict:
      description: >
        The request could not be completed due to a conflict with the
        current state of the resource. Resolve the conflict and try again.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
            required:
              - message
  schemas:
    Peer:
      type: object
      properties:
        id:
          type: string
        identity:
          type: string
        address:
          type: array
          items:
            type: string
        registered_at:
          type: string
        expires_in:
          type: string
      required:
        - registered_at
        - identity
        - address
      description: Describing a registered peer
    IdentityResponse:
      type: object
      properties:
        key:
          type: string
          description: >
            The relay server's public key encoded in the requested format.
        format:
          type: string
          enum:
            - base64
            - hex
            - emoji
            - fingerprint
          description: The encoding format used for the key.
        algorithm:
          type: string
          description: The identity algorithm configured on the server (e.g. ed25519).
      required:
        - key
        - format
        - algorithm
      description: Relay server public key with encoding metadata
    WebhookEvent:
      type: object
      properties:
        event:
          type: string
          enum:
            - message_arrived
        sender:
          type: string
          description: Base64 raw URL encoded public key of the sender
        receiver:
          type: string
          description: Base64 raw URL encoded public key of the receiver
        session_id:
          type: string
        queue_len:
          type: integer
          format: uint64
          description: Current number of messages in the queue
        timestamp:
          type: string
          format: date-time
      required:
        - event
        - sender
        - receiver
        - session_id
        - queue_len
        - timestamp
      description: JSON payload sent to registered webhook URLs on message arrival
    WSMessage:
      type: object
      properties:
        type:
          type: string
          description: >
            Message type. Inbound: message, ping. Outbound: connected,
            message, message_ack, message_queued, pong, error.
        sender:
          type: string
          description: Base64 raw URL encoded public key of the sender (outbound only)
        receiver:
          type: string
          description: Base64 raw URL encoded public key of the receiver (inbound only)
        session_id:
          type: string
        data:
          type: string
          description: Base64 raw URL encoded payload
        error:
          type: string
          description: Error description (error type only)
      required:
        - type
      description: JSON message format used over WebSocket connections
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        storage:
          type: string
          enum:
            - ok
            - degraded
        latency:
          type: string
          description: >
            Storage probe latency as a human-readable string
            (e.g. "1.234ms", "456.789µs").
        identity:
          type: string
          description: Configured identity algorithm
        uptime:
          type: string
          description: >
            Server uptime as a human-readable string
            (e.g. "5m 32s", "2h 15m 30s", "3d 0h 0m 0s").
        started_at:
          type: string
          description: >
            Server start time formatted as "2006-01-02 15:04:05 MST"
            (e.g. "2025-01-15 10:30:00 UTC").
      required:
        - status
        - storage
        - latency
        - identity
        - uptime
        - started_at
      description: Health status of the relay server
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
