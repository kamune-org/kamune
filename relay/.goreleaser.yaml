version: 2

project_name: kamune-relay

before:
  hooks:
    - go mod tidy

builds:
  - id: relay
    main: ./cmd/relay
    binary: kamune-relay
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: relay
    builds:
      - relay
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - .assets/config.toml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: kamune-org
    name: kamune
  prerelease: auto
  name_template: "Relay {{.Tag}}"
  header: |
    ## Kamune Relay {{.Version}}

    Relay server for the Kamune peer-to-peer communication project.
  footer: |
    **Full Changelog**: https://github.com/kamune-org/kamune/compare/{{ .PreviousTag }}...{{ .Tag }}
